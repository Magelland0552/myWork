 <!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-5">

<script>
// Protect dashboard
if(localStorage.getItem("adminLoggedIn") !== "true"){
    alert("Access denied");
    window.location.href = "admin-login.html";
}
</script>

<div class="container">

<h2 class="mb-4">Admin Dashboard</h2>

<button class="btn btn-danger mb-4" onclick="logout()">Logout</button>

<hr>

<h4>Add Product</h4>

<input id="pname" class="form-control mb-2" placeholder="Product Name">
<input id="pprice" type="number" class="form-control mb-2" placeholder="Price">

<button class="btn btn-success mb-3" onclick="addProduct()">Add Product</button>

<h4>Product List</h4>

<ul id="productList" class="list-group"></ul>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){

let name = document.getElementById("pname").value.trim();
let price = document.getElementById("pprice").value;

if(name === "" || price === ""){
alert("Please enter product name and price");
return;
}

products.push({name,price});

localStorage.setItem("products",JSON.stringify(products));

document.getElementById("pname").value="";
document.getElementById("pprice").value="";

showProducts();
}

function showProducts(){

let list = document.getElementById("productList");

list.innerHTML="";

products.forEach((p,index)=>{

let li = document.createElement("li");

li.className="list-group-item d-flex justify-content-between align-items-center";

li.innerHTML = `
${p.name} - $${p.price}
<button class="btn btn-sm btn-danger" onclick="deleteProduct(${index})">Delete</button>
`;

list.appendChild(li);

});

}

function deleteProduct(index){

products.splice(index,1);

localStorage.setItem("products",JSON.stringify(products));

showProducts();

}

function logout(){

localStorage.removeItem("adminLoggedIn");

window.location.href = "admin-login.html";

}

showProducts();

</script>

</body>
</html>
