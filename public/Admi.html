 <!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:400px">

<h3 class="text-center mb-4">Admin Login</h3>

<input id="username" class="form-control mb-3" placeholder="Username">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-dark w-100" onclick="login()">Login</button>

<p id="error" class="text-danger mt-3"></p>

</div>

<script>

const ADMIN_USER = "admin";
const ADMIN_PASS = "magelland123";

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === ADMIN_USER && pass === ADMIN_PASS){

localStorage.setItem("adminLoggedIn","true");

window.location.href = "Admi-dashboard.html";

}else{

document.getElementById("error").innerText = "Wrong login details";

}

}

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-5">

<script>

// protect dashboard
if(localStorage.getItem("AdmiLoggedIn") !== "true"){

alert("Access denied");

window.location.href = "Admi.html";

}

</script>

<h2>Admin Dashboard</h2>

<button class="btn btn-danger mb-4" onclick="logout()">Logout</button>

<hr>

<h4>Add Product</h4>

<input id="pname" class="form-control mb-2" placeholder="Product Name">

<input id="pprice" type="number" class="form-control mb-2" placeholder="Price">

<button class="btn btn-success" onclick="addProduct()">Add Product</button>

<ul id="productList" class="mt-4"></ul>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){

let name = document.getElementById("pname").value;
let price = document.getElementById("pprice").value;

products.push({name,price});

localStorage.setItem("products",JSON.stringify(products));

showProducts();

}

function showProducts(){

let list = document.getElementById("productList");

list.innerHTML="";

products.forEach(p=>{

let li = document.createElement("li");

li.innerText = p.name + " - $" + p.price;

list.appendChild(li);

});

}

showProducts();

function logout(){

localStorage.removeItem("adminLoggedIn");

window.location.href = "Admi.html";

}

</script>

</body>
</html>
